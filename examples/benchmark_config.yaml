datasets:
  - name: ricci
  - name: german

methods:
  - Baseline
  - FairSmote
  - Massaging
  - FairOversampling
  - FAWOS
  - HeterogeneousFOS
  - FairwayRemover
  - GeometricFairnessRepair
  - LearningFairRepresentations
  - ReweighingClassifier
  - FairBalanceClassifier
  - FairMask

classifiers:
  - path: sklearn.linear_model.LogisticRegression
    name: LogReg
    solver: liblinear
    max_iter: 1000
    random_state: 42
  - path: xgboost.XGBClassifier
    name: XGBoost
    eval_metric: logloss
    random_state: 42

cv:
  n_splits: 5
  random_state: 42

audit:
  bias: true
  fairness: true
